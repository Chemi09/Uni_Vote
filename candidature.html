<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidature - UniVote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            height: 60px;
            margin-bottom: 15px;
        }

        .header h1 {
            color: #0052cc;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0052cc;
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: #ff8c00;
            color: white;
        }

        .btn-submit:hover {
            background: #e67e00;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-cancel {
            background: #e9ecef;
            color: #333;
        }

        .btn-cancel:hover {
            background: #dee2e6;
        }

        .photo-preview {
            margin-top: 10px;
            text-align: center;
        }

        .photo-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 5px;
            border: 2px solid #ddd;
        }

        .optional {
            font-size: 12px;
            color: #999;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/images/univote-logo.png" alt="UniVote Logo">
            <h1>Candidature</h1>
            <p>Postulez pour un poste</p>
        </div>

        <div class="message" id="message"></div>

        <form id="candidatureForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="nom">Nom *</label>
                    <input type="text" id="nom" name="nom" required>
                </div>
                <div class="form-group">
                    <label for="prenom">Prénom *</label>
                    <input type="text" id="prenom" name="prenom" required>
                </div>
            </div>

            <div class="form-group">
                <label for="postnom">Postnom</label>
                <input type="text" id="postnom" name="postnom">
            </div>

            <div class="form-group">
                <label for="matricule">Matricule *</label>
                <input type="text" id="matricule" name="matricule" required placeholder="Ex: MAT123456">
            </div>

            <div class="form-group">
                <label for="poste">Poste Candidat *</label>
                <select id="poste" name="poste" required>
                    <option value="">-- Sélectionner un poste --</option>
                    <option value="Président">Président</option>
                    <option value="Vice-Président">Vice-Président</option>
                    <option value="Secrétaire">Secrétaire</option>
                    <option value="Trésorier">Trésorier</option>
                    <option value="Responsable Logistique">Responsable Logistique</option>
                    <option value="Responsable Communication">Responsable Communication</option>
                </select>
            </div>

            <div class="form-group">
                <label for="bio">Biographie <span class="optional">(optionnel)</span></label>
                <textarea id="bio" name="bio" rows="4" placeholder="Présentez-vous et expliquez votre candidature..."></textarea>
            </div>

            <div class="form-group">
                <label for="photo">Photo de Profil <span class="optional">(optionnel)</span></label>
                <input type="file" id="photo" name="photo" accept="image/*">
                <div class="photo-preview" id="photoPreview"></div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Soumettre Candidature</button>
                <button type="button" class="btn-cancel" onclick="goBack()">Annuler</button>
            </div>
        </form>
    </div>

    <script>
        // Aperçu de la photo
        document.getElementById('photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('photoPreview');
                    preview.innerHTML = `<img src="${event.target.result}" alt="Aperçu photo">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Soumission du formulaire
        document.getElementById('candidatureForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const nom = document.getElementById('nom').value.trim();
            const prenom = document.getElementById('prenom').value.trim();
            const postnom = document.getElementById('postnom').value.trim();
            const matricule = document.getElementById('matricule').value.trim();
            const poste = document.getElementById('poste').value;
            const bio = document.getElementById('bio').value.trim();
            const photoFile = document.getElementById('photo').files[0];

            // Validation
            if (!nom || !prenom || !matricule || !poste) {
                showMessage('Veuillez remplir tous les champs obligatoires', 'error');
                return;
            }

            if (matricule.length < 6) {
                showMessage('Le matricule doit contenir au moins 6 caractères', 'error');
                return;
            }

            // Vérifier si le matricule existe déjà pour ce poste
            const candidats = JSON.parse(localStorage.getItem('candidats') || '[]');
            if (candidats.some(c => c.matricule === matricule && c.poste === poste)) {
                showMessage('Vous êtes déjà candidat pour ce poste', 'error');
                return;
            }

            // Créer le nouveau candidat
            const nouveauCandidat = {
                id: Date.now(),
                nom,
                prenom,
                postnom,
                matricule,
                poste,
                bio,
                photo: null,
                dateInscription: new Date().toISOString()
            };

            // Traiter la photo si présente
            if (photoFile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    nouveauCandidat.photo = event.target.result;
                    saveCandidature(candidats, nouveauCandidat);
                };
                reader.readAsDataURL(photoFile);
            } else {
                saveCandidature(candidats, nouveauCandidat);
            }
        });

        function saveCandidature(candidats, candidat) {
            candidats.push(candidat);
            localStorage.setItem('candidats', JSON.stringify(candidats));

            showMessage('Candidature enregistrée avec succès!', 'success');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
