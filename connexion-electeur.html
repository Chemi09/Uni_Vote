<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Électeur - UniVote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            height: 60px;
            margin-bottom: 15px;
        }

        .header h1 {
            color: #0052cc;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #0052cc;
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: #0052cc;
            color: white;
        }

        .btn-submit:hover {
            background: #003d99;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-cancel {
            background: #e9ecef;
            color: #333;
        }

        .btn-cancel:hover {
            background: #dee2e6;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .signup-link a {
            color: #0052cc;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .demo-info {
            background: #e8f4f8;
            border-left: 4px solid #0052cc;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/images/univote-logo.png" alt="UniVote Logo">
            <h1>Connexion</h1>
            <p>Connectez-vous en tant qu'électeur</p>
        </div>

        <div class="demo-info">
            <strong>Conseil :</strong> Inscrivez-vous d'abord sur la page d'inscription pour créer votre compte.
        </div>

        <div class="message" id="message"></div>

        <form id="connexionForm">
            <div class="form-group">
                <label for="matricule">Matricule *</label>
                <input type="text" id="matricule" name="matricule" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Se connecter</button>
                <button type="button" class="btn-cancel" onclick="goBack()">Annuler</button>
            </div>
        </form>

        <div class="signup-link">
            Pas encore de compte? <a href="inscription.html">S'inscrire</a>
        </div>
    </div>

    <script>
        // Hachage simple du mot de passe
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16);
        }

        // Soumission du formulaire
        document.getElementById('connexionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const matricule = document.getElementById('matricule').value.trim();
            const password = document.getElementById('password').value;

            // Validation
            if (!matricule || !password) {
                showMessage('Veuillez remplir tous les champs', 'error');
                return;
            }

            // Rechercher l'électeur
            const electeurs = JSON.parse(localStorage.getItem('electeurs') || '[]');
            const electeur = electeurs.find(e => e.matricule === matricule && e.password === simpleHash(password));

            if (!electeur) {
                showMessage('Matricule ou mot de passe incorrect', 'error');
                return;
            }

            // Vérifier si déjà voté
            if (electeur.hasVoted) {
                showMessage('Vous avez déjà voté. Vous ne pouvez voter qu\'une seule fois.', 'error');
                return;
            }

            // Stocker la session
            localStorage.setItem('currentElecteur', JSON.stringify(electeur));
            showMessage('Connexion réussie! Redirection...', 'success');

            setTimeout(() => {
                window.location.href = 'vote.html';
            }, 1500);
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
