<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats - UniVote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content h1 {
            color: #0052cc;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header-content p {
            color: #666;
            font-size: 14px;
        }

        .header-actions button {
            background: #0052cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .header-actions button:hover {
            background: #003d99;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #0052cc;
        }

        .stat-card h3 {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .number {
            color: #0052cc;
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card.orange {
            border-left-color: #ff8c00;
        }

        .stat-card.orange .number {
            color: #ff8c00;
        }

        .poste-results {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .poste-results h2 {
            color: #0052cc;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #0052cc;
            padding-bottom: 10px;
        }

        .candidat-result {
            margin-bottom: 20px;
        }

        .candidat-result h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .candidat-result .rank {
            background: #0052cc;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
        }

        .candidat-result .votes {
            color: #ff8c00;
            font-weight: 700;
        }

        .progress-bar {
            background: #e9ecef;
            border-radius: 5px;
            height: 25px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #0052cc, #003d99);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            transition: width 0.5s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }

        .no-results {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-home {
            background: #0052cc;
            color: white;
        }

        .btn-home:hover {
            background: #003d99;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-refresh {
            background: #6c757d;
            color: white;
        }

        .btn-refresh:hover {
            background: #5a6268;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>📊 Résultats de l'Élection</h1>
                <p>Résultats en temps réel</p>
            </div>
            <div class="header-actions">
                <button onclick="location.reload()">Actualiser</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Votes Enregistrés</h3>
                <div class="number" id="totalVotes">0</div>
            </div>
            <div class="stat-card orange">
                <h3>Participation</h3>
                <div class="number" id="participation">0%</div>
            </div>
            <div class="stat-card">
                <h3>Électeurs</h3>
                <div class="number" id="totalElectors">0</div>
            </div>
            <div class="stat-card orange">
                <h3>Candidats</h3>
                <div class="number" id="totalCandidates">0</div>
            </div>
        </div>

        <div id="resultsContainer"></div>

        <div class="button-group">
            <button class="btn-home" onclick="goHome()">Retour à l'Accueil</button>
            <button class="btn-refresh" onclick="location.reload()">Actualiser</button>
        </div>
    </div>

    <script>
        // Calcul des résultats
        function calculateResults() {
            const candidats = JSON.parse(localStorage.getItem('candidats') || '[]');
            const votes = JSON.parse(localStorage.getItem('votes') || '[]');
            const electeurs = JSON.parse(localStorage.getItem('electeurs') || '[]');

            // Statistiques globales
            document.getElementById('totalVotes').textContent = votes.length;
            document.getElementById('totalElectors').textContent = electeurs.length;
            document.getElementById('totalCandidates').textContent = candidats.length;

            const participation = electeurs.length > 0 
                ? Math.round((votes.length / electeurs.length) * 100) 
                : 0;
            document.getElementById('participation').textContent = participation + '%';

            // Résultats par poste
            const postes = [...new Set(candidats.map(c => c.poste))];

            if (postes.length === 0 || votes.length === 0) {
                document.getElementById('resultsContainer').innerHTML = '<div class="no-results">Aucun résultat disponible pour le moment.</div>';
                return;
            }

            let html = '';
            postes.forEach(poste => {
                const candidatsPoste = candidats.filter(c => c.poste === poste);
                
                // Compter les votes pour chaque candidat
                const votesCounts = {};
                candidatsPoste.forEach(c => {
                    votesCounts[c.id] = 0;
                });

                votes.forEach(vote => {
                    vote.votes.forEach(v => {
                        if (v.poste === poste) {
                            votesCounts[v.candidatId] = (votesCounts[v.candidatId] || 0) + 1;
                        }
                    });
                });

                // Trier les candidats par nombre de votes
                const sortedCandidats = candidatsPoste.sort((a, b) => {
                    return (votesCounts[b.id] || 0) - (votesCounts[a.id] || 0);
                });

                const totalVotesPoste = Object.values(votesCounts).reduce((a, b) => a + b, 0);

                html += `<div class="poste-results">
                    <h2>${poste}</h2>`;

                sortedCandidats.forEach((candidat, index) => {
                    const candidatVotes = votesCounts[candidat.id] || 0;
                    const percentage = totalVotesPoste > 0 
                        ? Math.round((candidatVotes / totalVotesPoste) * 100) 
                        : 0;
                    const rank = index + 1;
                    const rankLabel = rank === 1 ? '🥇 1er' : rank === 2 ? '🥈 2e' : rank === 3 ? '🥉 3e' : `${rank}e`;

                    html += `
                        <div class="candidat-result">
                            <h3>
                                <span>${candidat.nom} ${candidat.prenom}</span>
                                <span class="rank">${rankLabel}</span>
                            </h3>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percentage}%">${percentage}%</div>
                            </div>
                            <div class="progress-info">
                                <span>${candidat.matricule}</span>
                                <span class="votes">${candidatVotes} vote${candidatVotes > 1 ? 's' : ''}</span>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
            });

            document.getElementById('resultsContainer').innerHTML = html;
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Initialisation
        window.addEventListener('load', function() {
            calculateResults();
        });

        // Mise à jour des résultats toutes les 3 secondes
        setInterval(calculateResults, 3000);
    </script>
</body>
</html>
